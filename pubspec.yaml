name: alertamed
description: "Aplicativo de adesão medicamentosa para idosos e pessoas com baixa visão."
publish_to: 'none'
version: 1.1.0+2

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  sqflite: ^2.3.3+1
  path_provider: ^2.1.3
  path: ^1.9.0
  intl: ^0.20.2
  flutter_local_notifications: ^17.2.4
  flutter_tts: ^4.2.2
  image_picker: ^1.1.2
  timezone: ^0.9.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  image_path: "assets/icon/icon.jpg"
  min_sdk_android: 21
  adaptive_icon_background: "#1565C0"
  adaptive_icon_foreground: "assets/icon/icon.jpg"

flutter:
  uses-material-design: true
  assets:
    - assets/icon/
